name = "episafe-admin"
main = "src/index.js"
compatibility_date = "2024-11-01"

# ---------------------------------------------------------------------------
# Static assets — serves the admin panel (the /admin single-page app).
# The folder below is uploaded alongside the Worker. Files in worker/public/admin
# are reachable at episafe.co/admin/...
# ---------------------------------------------------------------------------
[assets]
directory = "public"
binding = "ASSETS"

# ---------------------------------------------------------------------------
# D1 database binding. Create the database once with:
#   npx wrangler d1 create episafe-cms
# then paste the returned database_id below.
# ---------------------------------------------------------------------------
[[d1_databases]]
binding = "DB"
database_name = "episafewebsite"
database_id = "c39d5962-2aaa-428c-b9f7-b2aee56f6963"

# ---------------------------------------------------------------------------
# Routes — put the Worker in front of /api and /admin on your live domain so
# the rest of the static site keeps serving from wherever it lives today.
# Uncomment and set your zone after the database is created.
# ---------------------------------------------------------------------------
# routes = [
#   { pattern = "episafe.co/api/*", zone_name = "episafe.co" },
#   { pattern = "episafe.co/admin", zone_name = "episafe.co" },
#   { pattern = "episafe.co/admin/*", zone_name = "episafe.co" }
# ]

# Optional: image uploads for profile photos. Create with:
#   npx wrangler r2 bucket create episafe-uploads
# then uncomment. Without it, the panel uses pasted image URLs.
# [[r2_buckets]]
# binding = "UPLOADS"
# bucket_name = "episafe-uploads"

[vars]
# Comma-separated list of allowed browser origins for the API (CORS + Origin
# checks on writes). Include your live domain and any preview domains.
ALLOWED_ORIGINS = "https://episafe.co,https://www.episafe.co"
