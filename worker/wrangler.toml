name = "episafe-admin"
main = "src/index.js"
compatibility_date = "2024-11-01"

# ---------------------------------------------------------------------------
# Static assets — serves the dashboard (the /dashboard single-page app).
# The folder below is uploaded alongside the Worker. Files in worker/public/dashboard
# are reachable at admin.episafe.co/dashboard/...
# ---------------------------------------------------------------------------
[assets]
directory = "public"
binding = "ASSETS"

# ---------------------------------------------------------------------------
# D1 database binding. Create the database once with:
#   npx wrangler d1 create episafe-cms
# then paste the returned database_id below.
# ---------------------------------------------------------------------------
[[d1_databases]]
binding = "DB"
database_name = "episafewebsite"
database_id = "c39d5962-2aaa-428c-b9f7-b2aee56f6963"

# ---------------------------------------------------------------------------
# Custom domain. The episafe.co zone is on Cloudflare, so this provisions
# admin.episafe.co (proxied DNS record + TLS cert) pointing at this Worker on
# deploy. Dashboard: https://admin.episafe.co/dashboard · API: /api.
# NOTE: deploys use the root ./wrangler.toml; this mirror keeps `npm run deploy`
# from inside worker/ consistent.
# ---------------------------------------------------------------------------
routes = [
  { pattern = "admin.episafe.co", custom_domain = true }
]

# ---------------------------------------------------------------------------
# KV namespace for uploaded images (profile photos, news images). The admin
# panel POSTs to /api/uploads; files are served back from /uploads/<key>.
# ---------------------------------------------------------------------------
[[kv_namespaces]]
binding = "UPLOADS"
id = "ff86f41cf77544eb8f7841475d5f667c"

[vars]
# Comma-separated list of allowed browser origins for the API (CORS + Origin
# checks on writes). Include your live domain and any preview domains.
ALLOWED_ORIGINS = "https://episafe.co,https://www.episafe.co"
